services:
  clausy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clausy
    ports:
      - "5000:5000"
    environment:
      CLAUSY_BIND: "0.0.0.0"
      CLAUSY_PORT: "5000"
      CLAUSY_PROVIDER: "chatgpt"
      CLAUSY_CDP_HOST: "127.0.0.1"
      CLAUSY_CDP_PORT: "9200"
      CLAUSY_BROWSER_BOOTSTRAP: "auto"
      DISPLAY: ":99"
    volumes:
      - ./profile:/app/profile
    restart: unless-stopped
